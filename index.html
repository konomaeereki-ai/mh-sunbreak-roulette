<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MHD:LB 武器ルーレット</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family:'Orbitron',sans-serif;
    background:linear-gradient(#1b1b1b,#0c0c0c);
    color:white;
    text-align:center;
    margin:0;
    padding:20px;
}

h1{
    color:#ff7a2f;
}

#result{
    font-size:40px;
    margin:20px;
}

button{
    font-size:18px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#ff7a2f;
    color:white;
    cursor:pointer;
    margin:5px;
}

.box{
    background:#161616;
    border:2px solid #444;
    border-radius:10px;
    padding:15px;
    margin:20px auto;
    max-width:420px;
}

.weaponGrid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:5px;
    text-align:left;
}

.stat{
    margin-top:10px;
}

</style>
</head>

<body>

<h1>MHD:LB 武器ルーレット</h1>

<div id="result">？？？</div>

<button onclick="spin()">ルーレット</button>

<div class="box">

<h3>得意武器</h3>

<select id="favorite">
<option value="">なし</option>
</select>

</div>

<div class="box">

<h3>禁止武器</h3>

<div class="weaponGrid" id="banList"></div>

</div>

<div class="box">

<h3>結果記録</h3>

<button onclick="recordWin()">成功</button>
<button onclick="recordLose()">失敗</button>

<div class="stat" id="stats"></div>

</div>

<div class="box">

<h3>統計</h3>

<canvas id="chart"></canvas>

</div>

<script>

/* ======================
   武器データ
====================== */

const weapons=[

"大剣","太刀","片手剣","双剣",
"ハンマー","狩猟笛","ランス","ガンランス",
"スラッシュアックス","チャージアックス","操虫棍",
"ライトボウガン","ヘビィボウガン","弓"

]

let stats=JSON.parse(localStorage.getItem("stats"))||{}
let results=JSON.parse(localStorage.getItem("quest"))||{win:0,lose:0}

const favoriteSelect=document.getElementById("favorite")
const banList=document.getElementById("banList")

/* ======================
   UI生成
====================== */

weapons.forEach(w=>{

    let opt=document.createElement("option")
    opt.value=w
    opt.textContent=w
    favoriteSelect.appendChild(opt)

    let label=document.createElement("label")

    let box=document.createElement("input")
    box.type="checkbox"
    box.value=w

    label.appendChild(box)
    label.appendChild(document.createTextNode(" "+w))

    banList.appendChild(label)

})

/* ======================
   ルーレット
====================== */

function spin(){

    let banned=[...document.querySelectorAll("#banList input:checked")]
    .map(b=>b.value)

    let fav=favoriteSelect.value

    let pool=[]

    weapons.forEach(w=>{

        if(banned.includes(w)) return

        let weight=1

        if(w===fav) weight=3

        for(let i=0;i<weight;i++){
            pool.push(w)
        }

    })

    let result=pool[Math.floor(Math.random()*pool.length)]

    document.getElementById("result").textContent=result

    stats[result]=(stats[result]||0)+1

    localStorage.setItem("stats",JSON.stringify(stats))

    updateChart()

}

/* ======================
   クエスト結果
====================== */

function recordWin(){

    results.win++
    saveResult()

}

function recordLose(){

    results.lose++
    saveResult()

}

function saveResult(){

    localStorage.setItem("quest",JSON.stringify(results))
    updateStats()

}

/* ======================
   成功率表示
====================== */

function updateStats(){

    let total=results.win+results.lose

    let rate=total
        ?((results.win/total)*100).toFixed(1)
        :0

    document.getElementById("stats").innerHTML=
    `
    成功 ${results.win} / 失敗 ${results.lose}<br>
    成功率 ${rate}%
    `

}

/* ======================
   グラフ
====================== */

let chart

function updateChart(){

    let labels=Object.keys(stats)
    let data=Object.values(stats)

    if(chart) chart.destroy()

    chart=new Chart(
        document.getElementById("chart"),
        {
            type:"bar",
            data:{
                labels:labels,
                datasets:[
                    {
                        label:"使用回数",
                        data:data
                    }
                ]
            }
        }
    )

}

/* ======================
   初期ロード
====================== */

updateStats()
updateChart()

</script>

</body>
</html>
