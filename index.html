<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MHD:LB 武器ルーレット</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family:'Orbitron',sans-serif;
    background:linear-gradient(#1b1b1b,#0c0c0c);
    color:white;
    text-align:center;
    margin:0;
    padding:20px;
}

h1{
    color:#ff7a2f;
}

#result{
    font-size:42px;
    margin:20px;
    transition:0.3s;
}

#result.rare{
    color:#ffd700;
    text-shadow:0 0 10px #ffd700,0 0 20px #fff;
}

#luck{
    color:#7fffcc;
    margin-bottom:10px;
}

button{
    font-size:18px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#ff7a2f;
    color:white;
    cursor:pointer;
    margin:5px;
}

.box{
    background:#161616;
    border:2px solid #444;
    border-radius:10px;
    padding:15px;
    margin:20px auto;
    max-width:420px;
}

.weaponGrid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:6px;
    text-align:left;
}

/* レア演出 */

@keyframes goldFlash{
    0%{background:#0c0c0c;}
    50%{background:#ffd700;}
    100%{background:#0c0c0c;}
}

.flash{
    animation:goldFlash 0.6s ease 3;
}

</style>
</head>

<body>

<h1>MHD:LB 武器ルーレット</h1>

<div id="result">？？？</div>
<div id="luck"></div>

<button onclick="spin()">ルーレット</button>


<div class="box">

<h3>得意武器（確率UP）</h3>

<select id="favorite">
<option value="">なし</option>
</select>

</div>


<div class="box">

<h3>禁止武器</h3>

<div id="banList" class="weaponGrid"></div>

</div>


<div class="box">

<h3>クエスト結果</h3>

<button onclick="recordWin()">成功</button>
<button onclick="recordLose()">失敗</button>

<div id="stats"></div>

</div>


<div class="box">

<h3>武器統計</h3>

<canvas id="chart"></canvas>

</div>


<!-- 効果音 -->

<audio id="hitSE" src="SE/MHF Q.wav"></audio>
<audio id="luckSE" src="SE/ultl.wav"></audio>


<script>

/* =====================
   武器リスト
===================== */

const weapons=[

"大剣","太刀","片手剣","双剣",
"ハンマー","狩猟笛","ランス","ガンランス",
"スラッシュアックス","チャージアックス","操虫棍",
"ライトボウガン","ヘビィボウガン","弓"

]

/* =====================
   データ保存
===================== */

let stats=JSON.parse(localStorage.getItem("mh_stats")) || {}
let quest=JSON.parse(localStorage.getItem("mh_quest")) || {win:0,lose:0}

const fav=document.getElementById("favorite")
const banList=document.getElementById("banList")


/* =====================
   UI生成
===================== */

weapons.forEach(w=>{

    let opt=document.createElement("option")
    opt.value=w
    opt.textContent=w
    fav.appendChild(opt)

    let label=document.createElement("label")

    let box=document.createElement("input")
    box.type="checkbox"
    box.value=w

    label.appendChild(box)
    label.appendChild(document.createTextNode(" "+w))

    banList.appendChild(label)

})


/* =====================
   ルーレット
===================== */

function spin(){

    document.getElementById("luck").innerText=""

    const hitSE=document.getElementById("hitSE")
    const luckSE=document.getElementById("luckSE")

    let banned=[...document.querySelectorAll("#banList input:checked")]
    .map(b=>b.value)

    let favorite=fav.value

    let pool=[]

    weapons.forEach(w=>{

        if(banned.includes(w)) return

        let weight=1

        if(w===favorite) weight=3

        for(let i=0;i<weight;i++){
            pool.push(w)
        }

    })

    let result=pool[Math.floor(Math.random()*pool.length)]

    let res=document.getElementById("result")

    res.classList.remove("rare")
    res.innerText=result

    hitSE.currentTime=0
    hitSE.play().catch(()=>{})

    let isRare=false

    if(result==="片手剣" && Math.random()<0.02){

        isRare=true

        res.classList.add("rare")

        document.body.classList.add("flash")

        setTimeout(()=>{
            document.body.classList.remove("flash")
        },1800)

    }

    document.getElementById("luck").innerText="グッドラック！"

    if(isRare){

        hitSE.onended=function(){
            luckSE.currentTime=0
            luckSE.play().catch(()=>{})
        }

    }

    stats[result]=(stats[result]||0)+1

    localStorage.setItem("mh_stats",JSON.stringify(stats))

    updateChart()

}


/* =====================
   クエスト結果
===================== */

function recordWin(){

    quest.win++
    saveQuest()

}

function recordLose(){

    quest.lose++
    saveQuest()

}

function saveQuest(){

    localStorage.setItem("mh_quest",JSON.stringify(quest))

    updateQuest()

}

function updateQuest(){

    let total=quest.win+quest.lose

    let rate=total
        ?((quest.win/total)*100).toFixed(1)
        :0

    document.getElementById("stats").innerHTML=
    `
    成功 ${quest.win} / 失敗 ${quest.lose}<br>
    成功率 ${rate}%
    `

}


/* =====================
   グラフ
===================== */

let chart

function updateChart(){

    let labels=Object.keys(stats)
    let data=Object.values(stats)

    if(chart) chart.destroy()

    chart=new Chart(
        document.getElementById("chart"),
        {
            type:"bar",
            data:{
                labels:labels,
                datasets:[
                    {
                        label:"使用回数",
                        data:data,
                        backgroundColor:"#ff7a2f"
                    }
                ]
            },
            options:{
                responsive:true
            }
        }
    )

}


/* =====================
   初期読み込み
===================== */

updateQuest()
updateChart()

</script>

</body>
</html>
